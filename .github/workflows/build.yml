name: Build eDonish Auto — Cross-Platform (Flet)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  APP_NAME: edonish-auto
  APP_VERSION: 3.15.0
  # Python 3.11 for Windows (avoids api-ms-win-core-path-l1-1-0.dll error)
  PYTHON_VERSION_WIN: '3.11'
  PYTHON_VERSION: '3.12'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # BUILD: Windows .exe (Flet pack + UPX)
  # ═══════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_WIN }}

      - name: Install VC++ Redistributable
        run: choco install vcredist-all -y
        shell: pwsh

      - name: Install UPX for compression
        run: |
          choco install upx -y
          upx --version
        shell: pwsh

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet>=0.85.0 flet-desktop>=0.85.0 requests pyinstaller certifi
        shell: pwsh

      - name: Build GUI executable with flet pack
        run: |
          $certifiDir = python -c "import certifi; import os; print(os.path.dirname(certifi.__file__))"
          $upxDir = (Get-Command upx).Source | Split-Path
          flet pack main.py --name edonish-auto `
            --hidden-import requests `
            --hidden-import urllib3 `
            --hidden-import urllib3.util `
            --hidden-import certifi `
            --hidden-import charset_normalizer `
            --hidden-import idna `
            --hidden-import darkdetect `
            --hidden-import packaging `
            --add-data "${certifiDir}:certifi"
        shell: pwsh

      - name: Prepare dist directory
        run: |
          mkdir dist\windows
          copy dist\edonish-auto.exe dist\windows\
        shell: pwsh

      - name: Report binary size
        run: |
          $size = (Get-Item dist\windows\edonish-auto.exe).Length / 1MB
          Write-Host "GUI binary size: $([math]::Round($size, 1)) MB"
        shell: pwsh

      - name: Install NSIS and build installer
        run: |
          choco install nsis -y
          $env:Path = "C:\Program Files (x86)\NSIS;$env:Path"
          makensis /V4 installer.nsi
          copy "edonish-auto-${{ env.APP_VERSION }}-setup.exe" dist\windows\
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-windows
          path: dist/windows/

  # ═══════════════════════════════════════════════════════════════
  # BUILD: Linux binary + .deb + .rpm
  # ═══════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-6 libxext6 libxrender1 libxrandr2 \
            libxinerama1 libxcursor1 libxi6 libxtst6 \
            libgtk-3-0 libgdk-pixbuf2.0-0 libgl1 \
            libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libatspi2.0-0 rpm dpkg-dev \
            libgmp-dev libmpfr-dev libcairo2-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet>=0.85.0 flet-desktop>=0.85.0 requests pyinstaller certifi

      - name: Build GUI binary with flet pack
        run: |
          CERTIFI_DIR=$(python -c "import certifi; import os; print(os.path.dirname(certifi.__file__))")
          flet pack main.py --name edonish-auto \
            --hidden-import requests \
            --hidden-import urllib3 \
            --hidden-import certifi \
            --hidden-import darkdetect \
            --hidden-import packaging \
            --add-data "${CERTIFI_DIR}:certifi"

      - name: Move binary to dist/linux and report size
        run: |
          mkdir -p dist/linux
          mv dist/edonish-auto dist/linux/
          chmod +x dist/linux/edonish-auto
          SIZE=$(du -h dist/linux/edonish-auto | cut -f1)
          echo "GUI binary size: $SIZE"

      - name: Build .deb package
        run: bash package.sh deb

      - name: Build .rpm package
        run: bash package.sh rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-linux
          path: |
            dist/deb/
            dist/rpm/

  # ═══════════════════════════════════════════════════════════════
  # BUILD: macOS .app + .zip
  # ═══════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet>=0.85.0 flet-desktop>=0.85.0 requests pyinstaller certifi

      - name: Build macOS .app bundle with flet pack
        run: |
          CERTIFI_DIR=$(python -c "import certifi; import os; print(os.path.dirname(certifi.__file__))")
          flet pack main.py --name edonish-auto \
            --bundle-id tj.edonish.auto \
            --hidden-import requests \
            --hidden-import urllib3 \
            --hidden-import certifi \
            --hidden-import darkdetect \
            --hidden-import packaging \
            --add-data "${CERTIFI_DIR}:certifi"

      - name: Free disk space and package macOS app
        run: |
          # Remove build artifacts to free disk space
          rm -rf build/
          rm -rf ~/Library/Caches/flet/ 2>/dev/null || true
          pip cache purge 2>/dev/null || true
          df -h

          # Create ZIP archive
          mkdir -p dist/dmg
          cd dist
          zip -r dmg/edonish-auto-${{ env.APP_VERSION }}-macos.zip edonish-auto.app
          cd ..

          # Report size
          SIZE=$(du -h dist/dmg/edonish-auto-${{ env.APP_VERSION }}-macos.zip | cut -f1)
          echo "macOS ZIP size: $SIZE"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-macos
          path: dist/dmg/

  # ═══════════════════════════════════════════════════════════════
  # RELEASE: Create GitHub Release with all installers
  # ═══════════════════════════════════════════════════════════════
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List all artifacts
        run: find release-artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: eDonish Auto v${{ env.APP_VERSION }}
          body: |
            ## eDonish Auto v${{ env.APP_VERSION }}

            Автоматизация электронного журнала edonish.tj

            ### Что нового в v3.15.0:
            - 📝 Новая секция "Темы уроков и ДЗ" на странице Журнал!
            - 🗓️ Таблица дат с темами и домашними заданиями (пустые темы подсвечены красным)
            - ✏️ Введите список тем (по одной на строку) → кнопка "Заполнить темы" → автоматически заполняет пустые даты
            - 📚 Кнопка "Заполнить ДЗ" — автоматическое заполнение домашних заданий
            - 🔄 Кнопка "Обновить темы" — перезагрузка данных с edonish

            ### v3.14.1:
            - 🐛 ФИКС: четвертная оценка берёт СВЕЖИЕ данные с API edonish перед расчётом ceil(средний балл)

            ### v3.14.0:
            - 📊 Четвертные оценки = ceil(средний балл) вместо рандома
            - 🖱️ Клик на Чтв в Журнале = ceil(средний балл)
            - 🎲 Кнопка 🎲 (рандом) для каждого ученика

            ### v3.13.0:
            - 🎲 Новая кнопка 🎲 (рандом) для каждого ученика в Журнале! Одним кликом ставит рандомную оценку (3-10) в первую пустую дату
            - 🐛 КРИТИЧЕСКИЙ ФИКС: `mark_type_id` больше НЕ хардкодится как 8! Теперь `mark_type_id` = фактической оценке (3-10)
            - 🔄 Страница Журнал теперь АВТОМАТИЧЕСКИ обновляется после операций
            - 🔧 Фикс: Ctrl+S теперь корректно сравнивает с original_value (с сервера)

            ### v3.12.0:
            - 🐛 КРИТИЧЕСКИЙ ФИКС: `mark_type_id` больше НЕ хардкодится как 8! Теперь `mark_type_id` = фактической оценке (3-10), как у четвертных оценок. Раньше ВСЕ обычные оценки сохранялись как 8!
            - 🔄 Страница Журнал теперь АВТОМАТИЧЕСКИ обновляется после операций на странице Авто-оценки (удаление, заполнение)
            - 🔧 Фикс: Ctrl+S теперь корректно сравнивает с original_value (с сервера), а не с current_value — больше нет ложных «Нет изменений для сохранения»
            - 🐛 Критический фикс: mark ID теперь использует `assignmentMarkId` (удаление оценок работает!)
            - 🐛 Критический фикс: четвертные оценки — добавлены `mark_id`, `subject_id`, `curriculum_property_id` (422 ошибка исправлена!)
            - 🐛 Критический фикс: quarter IDs теперь group-specific из journal_options (2 четверть теперь показывает даты!)
            - 🔧 Фикс: subjects теперь содержат `curriculumPropertyId` из journal_options
            - 🔧 Фикс: groups обогащаются вложенными quarters и subjects для корректных API вызовов

            ### Установка:
            - **Windows**: Скачайте `edonish-auto-*-setup.exe`, запустите установщик
            - **Linux (Ubuntu/Debian)**: `sudo dpkg -i edonish-auto_*.deb`
            - **Linux (Fedora/RHEL)**: `sudo dnf install ./edonish-auto-*.rpm`
            - **macOS**: Распакуйте `edonish-auto-*-macos.zip`, перетащите .app в Applications

            ### Важно для Windows:
            Если .exe не запускается из-за ошибки DLL, установите:
            [Microsoft Visual C++ Redistributable (x64)](https://aka.ms/vs/17/release/vc_redist.x64.exe)

          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.rpm
            release-artifacts/**/*.deb
            release-artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
