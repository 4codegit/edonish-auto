name: Build eDonish Auto — Cross-Platform

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  APP_NAME: edonish-auto
  APP_VERSION: 2.1.0
  PYTHON_VERSION: '3.12'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # BUILD: Windows .exe (with ALL DLLs embedded)
  # ═══════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install VC++ Redistributable
        run: choco install vcredist-all -y
        shell: pwsh

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller customtkinter requests

      - name: Verify Tkinter works
        run: python -c "import tkinter; import customtkinter; print('OK')"
        shell: pwsh

      - name: Build GUI executable
        run: python -m PyInstaller edonish-auto.spec --clean --noconfirm
        shell: pwsh

      - name: Build CLI executable
        run: python -m PyInstaller edonish-auto-cli.spec --clean --noconfirm
        shell: pwsh

      - name: Prepare dist directory
        run: |
          mkdir dist\windows
          copy dist\edonish-auto.exe dist\windows\
          copy dist\edonish-auto-cli.exe dist\windows\
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-windows
          path: dist/windows/

  # ═══════════════════════════════════════════════════════════════
  # BUILD: Linux binary + .deb + .rpm
  # ═══════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk \
            libx11-6 libxext6 libxrender1 libxrandr2 \
            libxinerama1 libxcursor1 libxi6 libxtst6 \
            libgtk-3-0 libgdk-pixbuf2.0-0 libgl1 \
            libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libatspi2.0-0 rpm dpkg-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller customtkinter requests

      - name: Verify Tkinter works
        run: python -c "import tkinter; import customtkinter; print('OK')"

      - name: Build GUI binary (with --collect-all for tkinter)
        run: |
          python -m PyInstaller edonish-auto.spec --clean --noconfirm \
            --collect-all tkinter \
            --collect-all customtkinter

      - name: Build CLI binary
        run: python -m PyInstaller edonish-auto-cli.spec --clean --noconfirm

      - name: Move binaries to dist/linux
        run: |
          mkdir -p dist/linux
          mv dist/edonish-auto dist/linux/ 2>/dev/null || true
          mv dist/edonish-auto-cli dist/linux/ 2>/dev/null || true
          chmod +x dist/linux/*

      - name: Build .deb package
        run: bash package.sh deb

      - name: Build .rpm package
        run: bash package.sh rpm
        continue-on-error: true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-linux
          path: |
            dist/linux/
            dist/deb/
            dist/rpm/

  # ═══════════════════════════════════════════════════════════════
  # BUILD: macOS .app + .dmg
  # ═══════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller customtkinter requests

      - name: Verify Tkinter works
        run: python -c "import tkinter; import customtkinter; print('OK')"

      - name: Build macOS app bundle
        run: |
          python -m PyInstaller edonish-auto.spec --clean --noconfirm \
            --collect-all tkinter \
            --collect-all customtkinter

      - name: Build CLI binary
        run: python -m PyInstaller edonish-auto-cli.spec --clean --noconfirm

      - name: Create .dmg
        run: |
          mkdir -p dist/dmg
          cp dist/edonish-auto-cli dist/dmg/
          hdiutil create -volname "eDonish Auto" \
            -srcfolder "dist/eDonish Auto.app" \
            -ov -format UDZO \
            "dist/dmg/edonish-auto-${{ env.APP_VERSION }}.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-macos
          path: dist/dmg/

  # ═══════════════════════════════════════════════════════════════
  # RELEASE: Create GitHub Release with all installers
  # ═══════════════════════════════════════════════════════════════
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List all artifacts
        run: find release-artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: eDonish Auto v${{ env.APP_VERSION }}
          body: |
            ## eDonish Auto v${{ env.APP_VERSION }}

            Автоматизация электронного журнала edonish.tj

            ### Установка:
            - **Windows**: Скачайте `edonish-auto.exe`, запустите
            - **Linux (Ubuntu/Debian)**: `sudo dpkg -i edonish-auto_*.deb`
            - **Linux (Fedora/RHEL)**: `sudo rpm -i edonish-auto-*.rpm`
            - **macOS**: Откройте `edonish-auto-*.dmg`, перетащите в Applications

            ### CLI режим:
            ```bash
            edonish-auto-cli --login YOUR_LOGIN --password YOUR_PASSWORD
            ```

            ### Важно для Windows:
            Если .exe не запускается из-за ошибки DLL, установите:
            [Microsoft Visual C++ Redistributable (x64)](https://aka.ms/vs/17/release/vc_redist.x64.exe)

          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.rpm
            release-artifacts/**/*.deb
            release-artifacts/**/*.dmg
            release-artifacts/**/edonish-auto
            release-artifacts/**/edonish-auto-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
