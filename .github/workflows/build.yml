name: Build eDonish Auto — Cross-Platform (Flet)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  APP_NAME: edonish-auto
  APP_VERSION: 3.30.4
  # Python 3.11 for Windows (avoids api-ms-win-core-path-l1-1-0.dll error)
  PYTHON_VERSION_WIN: '3.11'
  PYTHON_VERSION: '3.12'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # BUILD: Windows .exe (Flet pack + UPX)
  # ═══════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_WIN }}

      - name: Install VC++ Redistributable
        run: choco install vcredist-all -y
        shell: pwsh

      - name: Install UPX for compression
        run: |
          choco install upx -y
          upx --version
        shell: pwsh

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet>=0.85.0 flet-desktop>=0.85.0 requests pyinstaller certifi
        shell: pwsh

      - name: Pre-cache Flet View (Flutter engine)
        shell: pwsh
        run: |
          # Trigger Flet View download by starting a minimal app with virtual display
          python -c "
          import flet as ft
          import sys, os, threading
          def main(page):
              page.window.destroy()
          try:
              t = threading.Thread(target=lambda: ft.app(target=main), daemon=True)
              t.start()
              t.join(timeout=15)
          except: pass
          " 2>$null || true
          # Find Flet View cache directory
          $fletViewDir = $null
          $cacheBase = "$env:LOCALAPPDATA\flet"
          if (Test-Path $cacheBase) {
              $fletViewDir = Get-ChildItem $cacheBase -Directory -Recurse -Filter "flet-desktop*" |
                  Sort-Object FullName -Descending | Select-Object -First 1
          }
          if ($fletViewDir) {
              Write-Host "Flet View found at: $($fletViewDir.FullName)"
              echo "FLET_VIEW_DIR=$($fletViewDir.FullName)" >> $env:GITHUB_ENV
          } else {
              Write-Host "WARNING: Flet View not found in cache"
          }

      - name: Build GUI executable with flet pack
        shell: pwsh
        run: |
          $certifiDir = python -c "import certifi; import os; print(os.path.dirname(certifi.__file__))"
          $packArgs = @(
              "main.py", "--name", "edonish-auto",
              "--hidden-import", "requests",
              "--hidden-import", "urllib3",
              "--hidden-import", "urllib3.util",
              "--hidden-import", "certifi",
              "--hidden-import", "charset_normalizer",
              "--hidden-import", "idna",
              "--hidden-import", "darkdetect",
              "--hidden-import", "packaging",
              "--add-data", "${certifiDir};certifi"
          )
          if ($env:FLET_VIEW_DIR -and (Test-Path $env:FLET_VIEW_DIR)) {
              Write-Host "Bundling Flet View from: $env:FLET_VIEW_DIR"
              $packArgs += @("--add-data", "$env:FLET_VIEW_DIR;flet_view")
          }
          flet pack @packArgs

      - name: Prepare dist directory
        run: |
          mkdir dist\windows
          copy dist\edonish-auto.exe dist\windows\
        shell: pwsh

      - name: Report binary size
        run: |
          $size = (Get-Item dist\windows\edonish-auto.exe).Length / 1MB
          Write-Host "GUI binary size: $([math]::Round($size, 1)) MB"
        shell: pwsh

      - name: Install NSIS and build installer
        run: |
          choco install nsis -y
          $env:Path = "C:\Program Files (x86)\NSIS;$env:Path"
          makensis /V4 installer.nsi
          copy "edonish-auto-${{ env.APP_VERSION }}-setup.exe" dist\windows\
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-windows
          path: dist/windows/

  # ═══════════════════════════════════════════════════════════════
  # BUILD: Linux binary + .deb + .rpm
  # ═══════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-6 libxext6 libxrender1 libxrandr2 \
            libxinerama1 libxcursor1 libxi6 libxtst6 \
            libgtk-3-0 libgdk-pixbuf2.0-0 libgl1 \
            libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libatspi2.0-0 rpm dpkg-dev \
            libgmp-dev libmpfr-dev libcairo2-dev \
            xvfb

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet>=0.85.0 flet-desktop>=0.85.0 requests pyinstaller certifi

      - name: Pre-cache Flet View (Flutter engine)
        run: |
          # Trigger Flet View download by starting a minimal Flet app with virtual display
          timeout 30 xvfb-run python -c "
          import flet as ft
          import sys, threading
          def main(page):
              page.window.destroy()
          try:
              t = threading.Thread(target=lambda: ft.app(target=main), daemon=True)
              t.start()
              t.join(timeout=15)
          except: pass
          " 2>/dev/null || true
          # Find Flet View cache directory
          FLET_VIEW_DIR=$(find ~/.flet ~/.cache/flet -maxdepth 3 -type d -name 'flet-desktop*' 2>/dev/null | sort -r | head -1)
          if [ -n "$FLET_VIEW_DIR" ] && [ -d "$FLET_VIEW_DIR" ]; then
              echo "Flet View found at: $FLET_VIEW_DIR"
              echo "FLET_VIEW_DIR=$FLET_VIEW_DIR" >> $GITHUB_ENV
          else
              echo "WARNING: Flet View not found in cache"
          fi

      - name: Build GUI binary with flet pack
        run: |
          CERTIFI_DIR=$(python -c "import certifi; import os; print(os.path.dirname(certifi.__file__))")
          PACK_ARGS="--name edonish-auto \
            --hidden-import requests \
            --hidden-import urllib3 \
            --hidden-import certifi \
            --hidden-import darkdetect \
            --hidden-import packaging \
            --add-data ${CERTIFI_DIR}:certifi"
          if [ -n "$FLET_VIEW_DIR" ] && [ -d "$FLET_VIEW_DIR" ]; then
              echo "Bundling Flet View from: $FLET_VIEW_DIR"
              PACK_ARGS="$PACK_ARGS --add-data ${FLET_VIEW_DIR}:flet_view"
          fi
          eval flet pack main.py $PACK_ARGS

      - name: Move binary to dist/linux and report size
        run: |
          mkdir -p dist/linux
          mv dist/edonish-auto dist/linux/
          chmod +x dist/linux/edonish-auto
          SIZE=$(du -h dist/linux/edonish-auto | cut -f1)
          echo "GUI binary size: $SIZE"

      - name: Build .deb package
        run: bash package.sh deb

      - name: Build .rpm package
        run: bash package.sh rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-linux
          path: |
            dist/deb/
            dist/rpm/

  # ═══════════════════════════════════════════════════════════════
  # BUILD: macOS .app + .zip
  # ═══════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet>=0.85.0 flet-desktop>=0.85.0 requests pyinstaller certifi

      - name: Pre-cache Flet View (Flutter engine)
        run: |
          # Trigger Flet View download by starting a minimal Flet app
          timeout 30 python -c "
          import flet as ft
          import sys, threading
          def main(page):
              page.window.destroy()
          try:
              t = threading.Thread(target=lambda: ft.app(target=main), daemon=True)
              t.start()
              t.join(timeout=15)
          except: pass
          " 2>/dev/null || true
          # Find Flet View cache directory
          FLET_VIEW_DIR=$(find ~/Library/Caches/flet ~/.flet -maxdepth 3 -type d -name 'flet-*' 2>/dev/null | sort -r | head -1)
          if [ -n "$FLET_VIEW_DIR" ] && [ -d "$FLET_VIEW_DIR" ]; then
              echo "Flet View found at: $FLET_VIEW_DIR"
              echo "FLET_VIEW_DIR=$FLET_VIEW_DIR" >> $GITHUB_ENV
          else
              echo "WARNING: Flet View not found in cache"
          fi

      - name: Build macOS .app bundle with flet pack
        run: |
          CERTIFI_DIR=$(python -c "import certifi; import os; print(os.path.dirname(certifi.__file__))")
          PACK_ARGS="--name edonish-auto \
            --bundle-id tj.edonish.auto \
            --hidden-import requests \
            --hidden-import urllib3 \
            --hidden-import certifi \
            --hidden-import darkdetect \
            --hidden-import packaging \
            --add-data ${CERTIFI_DIR}:certifi"
          if [ -n "$FLET_VIEW_DIR" ] && [ -d "$FLET_VIEW_DIR" ]; then
              echo "Bundling Flet View from: $FLET_VIEW_DIR"
              PACK_ARGS="$PACK_ARGS --add-data ${FLET_VIEW_DIR}:flet_view"
          fi
          eval flet pack main.py $PACK_ARGS

      - name: Free disk space and package macOS app
        run: |
          # Remove build artifacts to free disk space
          rm -rf build/
          rm -rf ~/Library/Caches/flet/ 2>/dev/null || true
          pip cache purge 2>/dev/null || true
          df -h

          # Create ZIP archive
          mkdir -p dist/dmg
          cd dist
          zip -r dmg/edonish-auto-${{ env.APP_VERSION }}-macos.zip edonish-auto.app
          cd ..

          # Report size
          SIZE=$(du -h dist/dmg/edonish-auto-${{ env.APP_VERSION }}-macos.zip | cut -f1)
          echo "macOS ZIP size: $SIZE"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-macos
          path: dist/dmg/

  # ═══════════════════════════════════════════════════════════════
  # BUILD: Android APK (best-effort — won't block release)
  # ═══════════════════════════════════════════════════════════════
  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block release if Android build fails
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Java (required by Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet>=0.85.0 requests certifi

      - name: Accept Android SDK licenses
        run: |
          # Accept all Android SDK licenses to avoid interactive prompts
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Build Android APK with flet build apk
        run: |
          flet build apk \
            --project-name edonish-auto \
            --description "Automated grade management for edonish.tj" \
            --bundle-id tj.edonish.auto
        timeout-minutes: 30

      - name: Move APK to dist
        run: |
          mkdir -p dist/android
          # flet build apk outputs to build/apk/ directory
          APK_FILE=$(find build/apk/ -name '*.apk' -type f 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" dist/android/edonish-auto-${{ env.APP_VERSION }}.apk
            echo "APK found: $APK_FILE"
          else
            echo "WARNING: No APK found in build/apk/, searching build/..."
            APK_FILE=$(find build/ -name '*.apk' -type f 2>/dev/null | head -1)
            if [ -n "$APK_FILE" ]; then
              cp "$APK_FILE" dist/android/edonish-auto-${{ env.APP_VERSION }}.apk
              echo "APK found: $APK_FILE"
            else
              echo "WARNING: No APK file found. Android build may have failed."
              echo "Creating empty marker file so artifact upload doesn't fail"
              echo "Android APK build failed" > dist/android/APK_BUILD_FAILED.txt
            fi
          fi
          ls -la dist/android/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-android
          path: dist/android/
        if: always()  # Upload even if APK wasn't created

  # ═══════════════════════════════════════════════════════════════
  # RELEASE: Create GitHub Release with all installers
  # ═══════════════════════════════════════════════════════════════
  release:
    needs: [build-windows, build-linux, build-macos, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Ensure tag exists for release
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="v${{ env.APP_VERSION }}"
          if ! git tag -l "$TAG" | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi
          echo "Using tag: $TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List all artifacts
        run: find release-artifacts -type f | head -30

      - name: Remove failed build markers
        run: find release-artifacts -name 'APK_BUILD_FAILED.txt' -delete || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: eDonish Auto v${{ env.APP_VERSION }}
          body: |
            ## eDonish Auto v3.30.4

            Автоматизация электронного журнала edonish.tj

            ### Что нового в v3.30.4:
            - Уменьшен риск зависания Flet при загрузке большого журнала
            - Добавлена защита от повторной параллельной загрузки журнала
            - Улучшен throttling `page.update()` без размножения фоновых update-потоков
            - API-клиент теперь корректно принимает успешные пустые ответы
            - Исправлен CLI fallback на `EDONISH_LOGIN` и `EDONISH_PASSWORD`

            ### Что нового в v3.30.3:
            - Исправлена обработка 409 Conflict при удалении оценок
            - Массовое удаление больше не засоряет лог одинаковыми ошибками, а показывает краткий итог конфликтов API
            - Добавлены дополнительные варианты запроса `/journal/mark/delete`

            ### Что нового в v3.30.2:
            - Исправлено: Linux/macOS pre-cache Flet View теперь использует актуальный API `page.window.destroy()`
            - Устранён риск зависания pre-cache шага до timeout в CI/CD с Flet 0.85+

            ### Что нового в v3.30.1:
            - Исправлено: Flet View (Flutter движок) теперь включён в бинарник
            - Приложение будет работать на чистых машинах без кэша Flet
            - Улучшено определение FLET_VIEW_PATH в PyInstaller бандле
            - Добавлен pre-cache Flet View в CI/CD для всех платформ

            ### Что нового в v3.29.0:
            - Исправлена критическая ошибка GitHub Actions — Windows билд не создавался
            - Исправлен разделитель --add-data для Windows (должен быть ; а не :)
            - Исправлена версия в RPM spec файле
            - Release теперь создаётся и при workflow_dispatch

            ### Установка:
            - **Windows**: Скачайте `edonish-auto-*-setup.exe`, запустите установщик
            - **Linux (Ubuntu/Debian)**: `sudo dpkg -i edonish-auto_*.deb`
            - **Linux (Fedora/RHEL)**: `sudo dnf install ./edonish-auto-*.rpm`
            - **macOS**: Распакуйте `edonish-auto-*-macos.zip`, перетащите .app в Applications
            - **Android**: Скачайте `.apk` файл и установите

            ### Важно для Windows:
            Если .exe не запускается из-за ошибки DLL, установите:
            [Microsoft Visual C++ Redistributable (x64)](https://aka.ms/vs/17/release/vc_redist.x64.exe)

          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.rpm
            release-artifacts/**/*.deb
            release-artifacts/**/*.zip
            release-artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
