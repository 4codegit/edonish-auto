name: Build eDonish Auto — Cross-Platform (Flet)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  APP_NAME: edonish-auto
  APP_VERSION: 3.0.2
  # Python 3.11 for Windows (avoids api-ms-win-core-path-l1-1-0.dll error)
  PYTHON_VERSION_WIN: '3.11'
  PYTHON_VERSION: '3.12'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # BUILD: Windows .exe (Flet pack)
  # ═══════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_WIN }}

      - name: Install VC++ Redistributable
        run: choco install vcredist-all -y
        shell: pwsh

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet flet-desktop requests pyinstaller
        shell: pwsh

      - name: Build GUI executable with flet pack
        run: |
          $certifiDir = python -c "import certifi; import os; print(os.path.dirname(certifi.__file__))"
          flet pack main.py --name edonish-auto `
            --hidden-import requests `
            --hidden-import urllib3 `
            --hidden-import urllib3.util `
            --hidden-import certifi `
            --hidden-import charset_normalizer `
            --hidden-import idna `
            --hidden-import darkdetect `
            --hidden-import packaging `
            --add-data "${certifiDir}:certifi"
        shell: pwsh

      - name: Build CLI executable
        run: |
          python -m PyInstaller --clean --noconfirm `
            --onefile `
            --name edonish-auto-cli `
            --hidden-import=requests `
            --hidden-import=urllib3 `
            --hidden-import=urllib3.util `
            --hidden-import=certifi `
            --collect-all certifi `
            main_cli.py
        shell: pwsh

      - name: Prepare dist directory
        run: |
          mkdir dist\windows
          copy dist\edonish-auto.exe dist\windows\
          copy dist\edonish-auto-cli.exe dist\windows\
        shell: pwsh

      - name: Build installer with Inno Setup
        run: |
          $iscc = Get-ChildItem "C:\Program Files*\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iscc) {
            choco install innosetup -y
            $iscc = Get-ChildItem "C:\Program Files*\Inno Setup*\ISCC.exe" | Select-Object -First 1
          }
          & $iscc.FullName installer.iss
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-windows
          path: dist/windows/

  # ═══════════════════════════════════════════════════════════════
  # BUILD: Linux binary + .deb + .rpm
  # ═══════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk \
            libx11-6 libxext6 libxrender1 libxrandr2 \
            libxinerama1 libxcursor1 libxi6 libxtst6 \
            libgtk-3-0 libgdk-pixbuf2.0-0 libgl1 \
            libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libatspi2.0-0 rpm dpkg-dev \
            libgmp-dev libmpfr-dev libcairo2-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet flet-desktop requests pyinstaller

      - name: Build GUI binary (flet pack)
        run: |
          CERTIFI_DIR=$(python -c "import certifi; import os; print(os.path.dirname(certifi.__file__))")
          flet pack main.py --name edonish-auto \
            --hidden-import requests \
            --hidden-import urllib3 \
            --hidden-import certifi \
            --hidden-import darkdetect \
            --hidden-import packaging \
            --add-data "${CERTIFI_DIR}:certifi"

      - name: Build CLI binary
        run: |
          python -m PyInstaller --clean --noconfirm \
            --onefile \
            --name edonish-auto-cli \
            --hidden-import=requests \
            --hidden-import=urllib3 \
            --hidden-import=certifi \
            --collect-all certifi \
            main_cli.py

      - name: Move binaries to dist/linux
        run: |
          mkdir -p dist/linux
          mv dist/edonish-auto dist/linux/
          mv dist/edonish-auto-cli dist/linux/
          chmod +x dist/linux/*

      - name: Build .deb package
        run: bash package.sh deb

      - name: Build .rpm package
        run: bash package.sh rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-linux
          path: |
            dist/linux/
            dist/deb/
            dist/rpm/

  # ═══════════════════════════════════════════════════════════════
  # BUILD: macOS .app + .dmg
  # ═══════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet flet-desktop requests pyinstaller

      - name: Build macOS .app bundle (flet pack)
        run: |
          CERTIFI_DIR=$(python -c "import certifi; import os; print(os.path.dirname(certifi.__file__))")
          flet pack main.py --name edonish-auto \
            --bundle-id tj.edonish.auto \
            --hidden-import requests \
            --hidden-import urllib3 \
            --hidden-import certifi \
            --hidden-import darkdetect \
            --hidden-import packaging \
            --add-data "${CERTIFI_DIR}:certifi"

      - name: Build CLI binary
        run: |
          python -m PyInstaller --clean --noconfirm \
            --onefile \
            --name edonish-auto-cli \
            --hidden-import=requests \
            --hidden-import=urllib3 \
            --hidden-import=certifi \
            --collect-all certifi \
            main_cli.py

      - name: Free disk space and package macOS app
        run: |
          # Remove build artifacts to free disk space
          rm -rf build/
          rm -rf ~/Library/Caches/flet/ 2>/dev/null || true
          pip cache purge 2>/dev/null || true
          df -h

          # Create ZIP archive instead of .dmg (requires less disk space)
          mkdir -p dist/dmg
          cp dist/edonish-auto-cli dist/dmg/
          cd dist
          zip -r dmg/edonish-auto-${{ env.APP_VERSION }}-macos.zip edonish-auto.app
          cd ..

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-macos
          path: dist/dmg/

  # ═══════════════════════════════════════════════════════════════
  # RELEASE: Create GitHub Release with all installers
  # ═══════════════════════════════════════════════════════════════
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List all artifacts
        run: find release-artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: eDonish Auto v${{ env.APP_VERSION }}
          body: |
            ## eDonish Auto v${{ env.APP_VERSION }}

            Автоматизация электронного журнала edonish.tj

            ### Что нового:
            - Windows-установщик теперь на Inno Setup (вместо NSIS)
            - Исправлена ошибка запуска GUI (Flutter Engine встроен в сборку через flet pack)
            - Исправлена ошибка SSL при загрузке Flutter Engine (monkey-patch ssl.create_default_context)
            - Заменён ft.app() на ft.run() (устаревший API)
            - Добавлена автоматическая установка FLET_VIEW_PATH для PyInstaller

            ### Установка:
            - **Windows**: Скачайте `edonish-auto-3.0.2-setup.exe`, запустите установщик
            - **Linux (Ubuntu/Debian)**: `sudo dpkg -i edonish-auto_*.deb`
            - **Linux (Fedora/RHEL)**: `sudo dnf install ./edonish-auto-*.rpm`
            - **macOS**: Распакуйте `edonish-auto-*-macos.zip`, перетащите .app в Applications

            ### CLI режим (Windows):
            После установки CLI доступен в папке программы или через меню Пуск

            ### CLI режим (Linux/macOS):
            ```bash
            edonish-auto-cli --login YOUR_LOGIN --password YOUR_PASSWORD
            ```

            ### Важно для Windows:
            Если .exe не запускается из-за ошибки DLL, установите:
            [Microsoft Visual C++ Redistributable (x64)](https://aka.ms/vs/17/release/vc_redist.x64.exe)

          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.rpm
            release-artifacts/**/*.deb
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/edonish-auto
            release-artifacts/**/edonish-auto-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
