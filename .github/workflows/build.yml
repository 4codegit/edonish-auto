name: Build eDonish Auto — Cross-Platform (Flet)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  # Python 3.11 for Windows (avoids api-ms-win-core-path-l1-1-0.dll error)
  PYTHON_VERSION_WIN: '3.11'
  PYTHON_VERSION: '3.12'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # PREPARE: Read version from config.py
  # ═══════════════════════════════════════════════════════════════
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.APP_VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from config.py
        id: version
        run: |
          VERSION=$(python3 -c "import sys; sys.path.insert(0, '.'); from config import APP_VERSION; print(APP_VERSION)")
          echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  # ═══════════════════════════════════════════════════════════════
  # BUILD: Windows .exe (Flet pack + UPX)
  # ═══════════════════════════════════════════════════════════════
  build-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_WIN }}

      - name: Install VC++ Redistributable
        run: choco install vcredist-all -y
        shell: pwsh

      - name: Install UPX for compression
        run: |
          choco install upx -y
          upx --version
        shell: pwsh

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet>=0.85.0 flet-desktop>=0.85.0 requests pyinstaller certifi
        shell: pwsh

      - name: Pre-cache Flet client and build GUI (with retry)
        shell: bash
        run: |
          max_retries=5
          delay=30
          for i in $(seq 1 $max_retries); do
            echo "Attempt $i of $max_retries: Caching Flet client..."
            if python -c "import flet_desktop; flet_desktop.ensure_client_cached()"; then
              echo "Flet client cached successfully!"
              break
            fi
            echo "Attempt $i failed."
            if [ $i -lt $max_retries ]; then
              echo "Retrying in $delay seconds..."
              sleep $delay
              delay=$((delay * 2))
            else
              echo "All $max_retries pre-cache attempts failed. Will try flet pack anyway..."
            fi
          done
          echo "Building GUI executable..."
          certifi_dir=$(python -c "import certifi; import os; print(os.path.dirname(certifi.__file__))")
          flet pack main.py --name edonish-auto \
            --hidden-import requests \
            --hidden-import urllib3 \
            --hidden-import urllib3.util \
            --hidden-import certifi \
            --hidden-import charset_normalizer \
            --hidden-import idna \
            --hidden-import darkdetect \
            --hidden-import packaging \
            --add-data "${certifi_dir}:certifi"

      - name: Prepare dist directory
        run: |
          mkdir dist\windows
          copy dist\edonish-auto.exe dist\windows\
        shell: pwsh

      - name: Report binary size
        run: |
          $size = (Get-Item dist\windows\edonish-auto.exe).Length / 1MB
          Write-Host "GUI binary size: $([math]::Round($size, 1)) MB"
        shell: pwsh

      - name: Install NSIS and build installer
        run: |
          # Install NSIS using winget (more reliable than choco)
          winget install --id NSIS.NSIS --silent --accept-package-agreements --accept-source-agreements
          $env:Path = "C:\Program Files (x86)\NSIS;$env:Path"
          # Update version in installer.nsi to match APP_VERSION
          (Get-Content installer.nsi) -replace '!define APPVERSION ".*"', "!define APPVERSION `"${{ env.APP_VERSION }}`"" | Set-Content installer.nsi
          makensis /V4 installer.nsi
          copy "edonish-auto-*-setup.exe" dist\windows\
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-windows
          path: dist/windows/

  # ═══════════════════════════════════════════════════════════════
  # BUILD: Linux binary + .deb + .rpm
  # ═══════════════════════════════════════════════════════════════
  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-6 libxext6 libxrender1 libxrandr2 \
            libxinerama1 libxcursor1 libxi6 libxtst6 \
            libgtk-3-0 libgdk-pixbuf2.0-0 libgl1 \
            libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libatspi2.0-0 rpm dpkg-dev \
            libgmp-dev libmpfr-dev libcairo2-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet>=0.85.0 flet-desktop>=0.85.0 requests pyinstaller certifi

      - name: Pre-cache Flet client (with retry)
        run: |
          max_retries=5
          delay=30
          for i in $(seq 1 $max_retries); do
            echo "Attempt $i of $max_retries: Caching Flet client..."
            if python -c "import flet_desktop; flet_desktop.ensure_client_cached()"; then
              echo "Flet client cached successfully!"
              break
            fi
            echo "Attempt $i failed."
            if [ $i -lt $max_retries ]; then
              echo "Retrying in $delay seconds..."
              sleep $delay
              delay=$((delay * 2))
            else
              echo "All $max_retries attempts failed!"
              exit 1
            fi
          done

      - name: Build GUI binary with flet pack
        run: |
          CERTIFI_DIR=$(python -c "import certifi; import os; print(os.path.dirname(certifi.__file__))")
          flet pack main.py --name edonish-auto \
            --hidden-import requests \
            --hidden-import urllib3 \
            --hidden-import certifi \
            --hidden-import darkdetect \
            --hidden-import packaging \
            --add-data "${CERTIFI_DIR}:certifi"

      - name: Move binary to dist/linux and report size
        run: |
          mkdir -p dist/linux
          mv dist/edonish-auto dist/linux/
          chmod +x dist/linux/edonish-auto
          SIZE=$(du -h dist/linux/edonish-auto | cut -f1)
          echo "GUI binary size: $SIZE"

      - name: Build .deb package
        run: bash package.sh deb

      - name: Build .rpm package
        run: bash package.sh rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-linux
          path: |
            dist/deb/
            dist/rpm/

  # ═══════════════════════════════════════════════════════════════
  # BUILD: macOS .app + .zip
  # ═══════════════════════════════════════════════════════════════
  build-macos:
    needs: prepare
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet>=0.85.0 flet-desktop>=0.85.0 requests pyinstaller certifi

      - name: Pre-cache Flet client (with retry)
        run: |
          max_retries=5
          delay=30
          for i in $(seq 1 $max_retries); do
            echo "Attempt $i of $max_retries: Caching Flet client..."
            if python -c "import flet_desktop; flet_desktop.ensure_client_cached()"; then
              echo "Flet client cached successfully!"
              break
            fi
            echo "Attempt $i failed."
            if [ $i -lt $max_retries ]; then
              echo "Retrying in $delay seconds..."
              sleep $delay
              delay=$((delay * 2))
            else
              echo "All $max_retries attempts failed!"
              exit 1
            fi
          done

      - name: Build macOS .app bundle with flet pack
        run: |
          CERTIFI_DIR=$(python -c "import certifi; import os; print(os.path.dirname(certifi.__file__))")
          flet pack main.py --name edonish-auto \
            --bundle-id tj.edonish.auto \
            --hidden-import requests \
            --hidden-import urllib3 \
            --hidden-import certifi \
            --hidden-import darkdetect \
            --hidden-import packaging \
            --add-data "${CERTIFI_DIR}:certifi"

      - name: Free disk space and package macOS app
        run: |
          # Remove build artifacts to free disk space
          rm -rf build/
          rm -rf ~/Library/Caches/flet/ 2>/dev/null || true
          pip cache purge 2>/dev/null || true
          df -h

          # Create ZIP archive
          mkdir -p dist/dmg
          cd dist
          zip -r dmg/edonish-auto-${{ env.APP_VERSION }}-macos.zip edonish-auto.app
          cd ..

          # Report size
          SIZE=$(du -h dist/dmg/edonish-auto-${{ env.APP_VERSION }}-macos.zip | cut -f1)
          echo "macOS ZIP size: $SIZE"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-macos
          path: dist/dmg/

  # ═══════════════════════════════════════════════════════════════
  # BUILD: Android APK (Flet build apk)
  # ═══════════════════════════════════════════════════════════════
  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet>=0.85.0 requests certifi

      - name: Build Android APK with flet
        run: |
          flet build apk . \
            --project edonish-auto \
            --bundle-id tj.edonish.auto \
            --product "eDonish Auto" \
            --org tj.edonish \
            --build-version "${{ env.APP_VERSION }}" \
            --build-number 1 \
            --exclude .github \
            --exclude build \
            --exclude dist \
            --exclude __pycache__ \
            --exclude .git \
            --exclude Dockerfile \
            --exclude docker-compose.yml \
            --exclude edonish-auto.spec \
            --exclude edonish-auto.spec.rpm \
            --exclude edonish-auto-cli.spec \
            --exclude installer.nsi \
            --exclude package.sh \
            --exclude build.sh \
            --exclude Makefile \
            --exclude run.sh \
            --exclude debian.control \
            --yes

      - name: Prepare APK artifact
        run: |
          mkdir -p dist/android
          # flet build apk outputs to build/apk/ directory
          APK_FILE=$(find build/apk/ -name "*.apk" -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" dist/android/edonish-auto-${{ env.APP_VERSION }}.apk
            echo "APK found: $APK_FILE"
          else
            echo "ERROR: No APK found in build/apk/"
            find build/ -name "*.apk" -type f 2>/dev/null || true
            exit 1
          fi

      - name: Report APK size
        run: |
          SIZE=$(du -h dist/android/edonish-auto-${{ env.APP_VERSION }}.apk | cut -f1)
          echo "Android APK size: $SIZE"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-android
          path: dist/android/

  # ═══════════════════════════════════════════════════════════════
  # RELEASE: Create GitHub Release with all installers
  # ═══════════════════════════════════════════════════════════════
  release:
    needs: [prepare, build-windows, build-linux, build-macos, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List all artifacts
        run: find release-artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: eDonish Auto v${{ env.APP_VERSION }}
          body: |
            ## eDonish Auto v${{ env.APP_VERSION }}

            Автоматизация электронного журнала edonish.tj

            ### Что нового:
            - 🎓 Автоматический расчёт полугодия (нужны 2 четверти) и годовой (нужна 4-я четверть)
            - 🎲 Кубик заполняет ВСЮ строку рандомными оценками
            - 📊 Дефолтный диапазон оценок 5-10, можно вручную ввести 11
            - 🗑 Убран «Просмотр данных» из админки
            - 🐛 Исправлен краш padding.symmetric/BorderRadius (Flet 0.85+)
            - 🔁 Retry при скачивании Flet клиента (502 Bad Gateway в CI)
            - 🪟 Исправлена сборка Windows (bash вместо PowerShell)
            - 🎭 Выбор любой роли (включая искусственный выбор админа)
            - 📱 Мобильный горизонтальный скролл в журнале
            - 👤 Аватар с именем и ролью в AppBar
            - 🔒 Права на оценки: проверка ВСЕХ ролей пользователя
            - Дробные оценки (1/2, 0/2) показывают только числитель

            ### Установка:
            - **Windows**: Скачайте `edonish-auto-*-setup.exe`, запустите установщик
            - **Linux (Ubuntu/Debian)**: `sudo dpkg -i edonish-auto_*.deb`
            - **Linux (Fedora/RHEL)**: `sudo rpm -i edonish-auto-*.rpm`
            - **macOS**: Распакуйте `edonish-auto-*-macos.zip`, перетащите .app в Applications
            - **Android**: Скачайте `edonish-auto-*.apk`, включите установку из неизвестных источников

            ### Важно для Windows:
            Если .exe не запускается из-за ошибки DLL, установите:
            [Microsoft Visual C++ Redistributable (x64)](https://aka.ms/vs/17/release/vc_redist.x64.exe)

          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.rpm
            release-artifacts/**/*.deb
            release-artifacts/**/*.zip
            release-artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
