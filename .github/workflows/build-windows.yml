name: Build Windows Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Pre-cache Flet
        run: |
          python -c "import flet; print('Flet installed')"
          python -c "import flet_desktop; print('Flet desktop installed')"

      - name: Build GUI binary
        run: |
          flet pack main.py --onefile --name edonish-auto --windowed
        working-directory: ${{ github.workspace }}

      - name: Build CLI binary
        run: |
          pyinstaller edonish-auto-cli.spec --clean --noconfirm

      - name: List dist
        run: |
          dir dist

      - name: Create ZIP package
        run: |
          Compress-Archive -Path dist\edonish-auto.exe,dist\edonish-auto-cli.exe -DestinationPath edonish-auto-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-windows
          path: edonish-auto-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: edonish-auto-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
