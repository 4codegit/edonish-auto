name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Build Linux binary
        run: |
          go mod tidy
          GOOS=linux GOARCH=amd64 go build -o edonish-app-linux .

      - name: Build DEB package
        run: |
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/256x256/apps

          # Контрольный файл DEB
          cat > deb/DEBIAN/control << EOF
          Package: edonish-app
          Version: ${{ github.ref_name }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Edonish Team
          Description: Edonish автоматизация десктопное приложение
          EOF

          # Копируем бинарник
          cp edonish-app-linux deb/usr/bin/edonish-app
          chmod +x deb/usr/bin/edonish-app

          # Создаём .desktop файл
          cat > deb/usr/share/applications/edonish-app.desktop << EOF
          [Desktop Entry]
          Name=Edonish App
          Exec=/usr/bin/edonish-app
          Icon=edonish-app
          Type=Application
          Categories=Education;
          EOF

          # Создаём DEB пакет
          dpkg-deb --build deb edonish-app_${{ github.ref_name }}_amd64.deb

      - name: Build RPM package
        run: |
          mkdir -p rpm/SOURCES
          mkdir -p rpm/SPECS
          mkdir -p rpm/BUILD

          # Создаём tar.gz с исходниками
          tar -czvf rpm/SOURCES/edonish-app-${{ github.ref_name }}.tar.gz \
            --transform 's|^|edonish-app-${{ github.ref_name }}/|' \
            main.go controller.go client/ ui/ go.mod go.sum

          # SPEC файл
          cat > rpm/SPECS/edonish-app.spec << EOF
          Name: edonish-app
          Version: ${{ github.ref_name }}
          Release: 1%{?dist}
          Summary: Edonish автоматизация приложение
          License: MIT
          BuildArch: x86_64

          %description
          Десктопное приложение для автоматизации edonish.tj

          %prep
          %setup -q

          %build
          go mod tidy
          GOOS=linux GOARCH=amd64 go build -o edonish-app .

          %install
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/share/applications
          cp edonish-app %{buildroot}/usr/bin/
          chmod +x %{buildroot}/usr/bin/edonish-app

          cat > %{buildroot}/usr/share/applications/edonish-app.desktop << DESKTOP
          [Desktop Entry]
          Name=Edonish App
          Exec=/usr/bin/edonish-app
          Type=Application
          Categories=Education;
          DESKTOP

          %files
          /usr/bin/edonish-app
          /usr/share/applications/edonish-app.desktop

          %clean
          rm -rf %{buildroot}
          EOF

          # Собираем RPM
          rpmbuild -bb rpm/SPECS/edonish-app.spec \
            --define "_topdir $(pwd)/rpm"

          cp rpm/RPMS/x86_64/edonish-app-${{ github.ref_name }}-1.x86_64.rpm .

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-artifacts
          path: |
            edonish-app-linux
            edonish-app_${{ github.ref_name }}_amd64.deb
            edonish-app-${{ github.ref_name }}-1.x86_64.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install MinGW
        run: choco install mingw --no-progress

      - name: Build Windows binary
        run: |
          go mod tidy
          GOOS=windows GOARCH=amd64 go build -o edonish-app-windows.exe .

      - name: Create installer (NSIS)
        run: |
          choco install nsis --no-progress
          makensis -DXAMPP_PATH="C:\Program Files\xampp" installer.nsi
        continue-on-error: true

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v3
        with:
          name: windows-artifacts
          path: |
            edonish-app-windows.exe
            edonish-app-windows-installer.exe
        if: success()

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Fyne
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          export PATH=$PATH:$(go env GOPATH)/bin

      - name: Build Android APK
        run: |
          go mod tidy
          fyne package -os android -appID com.edonish.app -name edonish-app
        continue-on-error: true

      - name: Upload Android artifact
        uses: actions/upload-artifact@v3
        with:
          name: android-artifacts
          path: edonish-app.apk
        if: success()

  create-release:
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download Linux artifacts
        uses: actions/download-artifact@v3
        with:
          name: linux-artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v3
        with:
          name: windows-artifacts
        continue-on-error: true

      - name: Download Android artifacts
        uses: actions/download-artifact@v3
        with:
          name: android-artifacts
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            edonish-app-linux
            edonish-app_${{ github.ref_name }}_amd64.deb
            edonish-app-${{ github.ref_name }}-1.x86_64.rpm
            edonish-app-windows.exe
            edonish-app-windows-installer.exe
            edonish-app.apk
          body: |
            ## 🎉 Edonish App ${{ github.ref_name }}

            ### 📦 Доступные файлы:
            - **Linux**: `edonish-app-linux` (бинарник)
            - **Ubuntu/Debian**: `edonish-app_${{ github.ref_name }}_amd64.deb`
            - **Fedora/RHEL**: `edonish-app-${{ github.ref_name }}-1.x86_64.rpm`
            - **Windows**: `edonish-app-windows.exe` (бинарник)
            - **Windows Installer**: `edonish-app-windows-installer.exe`
            - **Android**: `edonish-app.apk`

            ### 🚀 Установка:

            #### Linux (DEB):
            ```bash
            sudo dpkg -i edonish-app_${{ github.ref_name }}_amd64.deb
            ```

            #### Linux (RPM):
            ```bash
            sudo rpm -i edonish-app-${{ github.ref_name }}-1.x86_64.rpm
            ```

            #### Windows:
            Запустите `edonish-app-windows.exe` или установщик

            #### Android:
            Установите APK файл на устройство

            ### 📝 Изменения:
            - Полный переход на Go + Fyne
            - Автоматизация входа и дашборд
            - Поддержка расписания, оценок, домашних заданий

        token: ${{ secrets.GITHUB_TOKEN }}
